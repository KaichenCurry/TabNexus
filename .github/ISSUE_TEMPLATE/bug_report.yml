name: Bug report
description: Report reproducible behavior that is not working as expected
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve TabNexus. Remove private tab titles, URLs, email addresses, and API keys before submitting.
  - type: input
    id: version
    attributes:
      label: TabNexus version
      placeholder: v0.17.1
    validations:
      required: true
  - type: input
    id: chrome
    attributes:
      label: Chrome and operating system
      placeholder: Chrome 138 on macOS 15
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Tab workbench
        - Workspace and cards
        - AI organization
        - Relationship map
        - Agent / MCP
        - Settings or export
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Tell us the smallest sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Sanitized screenshots or logs only. Never paste credentials.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys and private browser data from this report.
          required: true
